<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>시뮬봇 카드 플레이그라운드</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%F0%9F%8E%B4%3C/text%3E%3C/svg%3E">
  <style>
/* ============================================================
   Risu Console — 상상 세계를 해부하는 진단 계기판
   따뜻한 잉크빛 다크 + 앰버 인광. 모노=계기 라벨, sans=읽는 본문.

   ★ 디자인 교체 규약 (미래의 리디자인을 위해)
   이 파일 아래 모든 규칙은 색·폰트·모양을 오직 :root 토큰으로만
   참조한다. 컴포넌트 규칙에 원시 색/폰트 값을 절대 넣지 말 것.
   → 테마 전면 교체 = 이 :root 블록만 편집하면 끝 (마크업·JS 무변경).
   → 밝은 테마로 뒤집기: 표면(bg·surface)·잉크(ink)·라인(line) 계열의
     명도만 반전하고, amber 계열을 어두운 앰버로 낮추면 된다.
   → 레이아웃 리듬(간격·그리드)을 바꾸려면 각 컴포넌트의 grid/gap/padding을
     손댄다. 시각 정체성(look)과 배치(layout)는 분리돼 있다.
   ============================================================ */

:root {
  color-scheme: dark;

  /* 표면 — 따뜻한 잉크(순수 검정 아님) */
  --bg: #141110;
  --surface: #1c1815;
  --surface-2: #241f1a;
  --surface-3: #2c251d;
  --inset: #17130f;          /* 움푹한 readout 패널 바닥(pre·게이지·표) */
  --line: #372f26;
  --line-strong: #4a3f31;

  /* 잉크 */
  --ink: #ece3d4;
  --ink-mid: #b6aa96;
  --ink-dim: #837964;
  --ink-faint: #6a6153;      /* placeholder 등 최약 */

  /* 시그니처 — 앰버 인광 (살아있는/활성 신호 전부 이 색) */
  --amber: #f5a623;
  --amber-bright: #ffc257;
  --amber-dim: #a9791f;
  --on-amber: #1a1206;       /* 앰버 면 위 텍스트 */
  /* ↓ 앰버 파생 틴트: --amber를 바꾸면 아래 rgba도 같이 맞춰 바꿀 것 */
  --amber-glow: rgba(245, 166, 35, 0.16);
  --amber-line: rgba(245, 166, 35, 0.42);
  --amber-wash: rgba(245, 166, 35, 0.09);
  --amber-halo: rgba(245, 166, 35, 0.06);

  /* 인광 readout 본문 색 — A/B 전환 레버.
     A(현재)=앰버 풀 인광. 나중에 B로 낮추려면 이 한 줄만 var(--ink-mid)로. */
  --readout-ink: var(--amber);

  /* 냉색 대위 — 기계/엔진, 아주 드물게 */
  --cyan: #74b7c3;

  /* 의미색 */
  --bad: #e2654a;
  --bad-wash: rgba(226, 101, 74, 0.12);
  --warn: #e0924a;
  --warn-wash: rgba(224, 146, 74, 0.1);
  --chip-combat: #dc8068; --chip-combat-wash: rgba(220, 128, 104, 0.1);
  --chip-resource: #d7ae55; --chip-resource-wash: rgba(215, 174, 85, 0.1);
  --chip-pool: #d48395; --chip-pool-wash: rgba(212, 131, 149, 0.1);
  --chip-quest: #9b91d1; --chip-quest-wash: rgba(155, 145, 209, 0.1);
  --chip-settlement: #72a8bc; --chip-settlement-wash: rgba(114, 168, 188, 0.1);
  --chip-system: #9b9387; --chip-system-wash: rgba(155, 147, 135, 0.1);

  /* 타이포 (웹폰트 금지 → 시스템 스택. 한글 자동 폴백) */
  --font-mono: 'Cascadia Code', 'Cascadia Mono', ui-monospace, 'JetBrains Mono', 'D2Coding', Consolas, 'Courier New', monospace;
  --font-sans: 'Pretendard', 'Malgun Gothic', 'Apple SD Gothic Neo', system-ui, -apple-system, 'Segoe UI', sans-serif;

  /* 모양 */
  --r: 5px;
  --r-sm: 3px;
  --shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
  --glow: 0 0 0 1px var(--amber-line), 0 0 16px var(--amber-glow);
}

* { box-sizing: border-box; }

body {
  margin: 0;
  min-height: 100vh;
  background:
    radial-gradient(1200px 500px at 78% -10%, var(--amber-halo), transparent 60%),
    var(--bg);
  color: var(--ink);
  font-family: var(--font-sans);
  -webkit-font-smoothing: antialiased;
}

button, input, textarea, select { font: inherit; color: inherit; }
button { cursor: pointer; }

/* 계기 라벨 유틸: 모노 + 자간 + 딤. 한글은 폴백되어 자연스러움. */
.stat-label,
.drop-sub,
.link-state,
.entry-length,
.asset-meta,
.field > span,
.metric span,
.engine-inline-field > span,
.tab,
.status-pill,
.count-badge,
.badge,
.decorator-chip,
.import-editor summary {
  font-family: var(--font-mono);
  letter-spacing: 0.02em;
}

:focus-visible {
  outline: 2px solid var(--amber);
  outline-offset: 2px;
}

::selection { background: var(--amber-line); color: var(--on-amber); }

/* ── 상단 계기 헤더 ─────────────────────────────────────── */
.topbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 20px;
  padding: 18px 26px;
  background: linear-gradient(180deg, var(--surface), var(--bg));
  border-bottom: 1px solid var(--line);
}

.topbar h1 {
  display: flex;
  align-items: center;
  gap: 11px;
  margin: 0 0 5px;
  font-family: var(--font-mono);
  font-size: 20px;
  font-weight: 700;
  letter-spacing: 0.01em;
  color: var(--ink);
}

.topbar h1::before {
  content: "";
  width: 9px;
  height: 9px;
  border-radius: 50%;
  background: var(--amber);
  box-shadow: 0 0 10px var(--amber), 0 0 3px var(--amber-bright);
  animation: led 2.4s ease-in-out infinite;
}

@keyframes led { 0%, 100% { opacity: 1; } 50% { opacity: 0.35; } }

.topbar p {
  margin: 0;
  color: var(--ink-dim);
  font-size: 13px;
}

.status-pill {
  flex: 0 0 auto;
  border: 1px solid var(--line-strong);
  border-radius: var(--r-sm);
  padding: 7px 12px;
  color: var(--amber);
  font-size: 12px;
  background: var(--inset);
}
.shell-actions { display: flex; align-items: center; gap: 10px; }
.shell-actions .secondary-btn { margin-top: 0; }
.landing-topbar { justify-content: center; text-align: center; }
.landing-topbar .shell-actions { display: none; }

main {
  width: min(1460px, 100%);
  margin: 0 auto;
  padding: 24px 22px 60px;
}

/* ── 인테이크(드롭존) ───────────────────────────────────── */
.drop-section { display: grid; gap: 10px; }
.landing-hero { min-height: calc(100dvh - 130px); display: grid; place-content: center; gap: 18px; text-align: center; }
.landing-hero h2 { margin: 0; font-family: var(--font-mono); font-size: clamp(28px, 5vw, 52px); }
.landing-hero > p { margin: 0; color: var(--ink-mid); }
.landing-drop { width: min(720px, calc(100vw - 32px)); }
.landing-drop .dropzone { min-height: 260px; }
.landing-steps { display: flex; justify-content: center; gap: 28px; margin: 0; padding: 0; list-style-position: inside; color: var(--ink-dim); font-size: 13px; }
.text-link { border: 0; background: transparent; color: var(--ink-dim); text-decoration: underline; }

.dropzone {
  display: grid;
  place-items: center;
  min-height: 168px;
  border: 1.5px dashed var(--line-strong);
  border-radius: var(--r);
  padding: 26px;
  text-align: center;
  background:
    repeating-linear-gradient(45deg, transparent, transparent 11px, var(--amber-wash) 11px, var(--amber-wash) 12px),
    var(--surface);
  transition: border-color 140ms ease, box-shadow 140ms ease, background-color 140ms ease;
}

.dropzone.dragging {
  border-color: var(--amber);
  border-style: solid;
  box-shadow: var(--glow);
}

.drop-title {
  font-family: var(--font-mono);
  font-size: 19px;
  font-weight: 700;
  color: var(--ink);
}

.drop-sub { margin-top: 8px; color: var(--ink-dim); font-size: 12px; }

/* ── 버튼 ───────────────────────────────────────────────── */
.primary-btn,
.secondary-btn {
  border-radius: var(--r-sm);
  padding: 9px 14px;
  font-family: var(--font-mono);
  font-size: 13px;
  letter-spacing: 0.02em;
  transition: filter 120ms ease, box-shadow 120ms ease, border-color 120ms ease;
}

.primary-btn {
  margin-top: 16px;
  background: var(--amber);
  border: 1px solid var(--amber);
  color: var(--on-amber);
  font-weight: 700;
}
.primary-btn:hover { filter: brightness(1.08); box-shadow: 0 0 14px var(--amber-glow); }

.secondary-btn {
  background: var(--surface-2);
  border: 1px solid var(--line-strong);
  color: var(--amber);
}
.secondary-btn:hover { border-color: var(--amber-line); }

button:disabled { opacity: 0.4; cursor: not-allowed; }

.message { min-height: 20px; color: var(--ink-dim); font-size: 13px; font-family: var(--font-mono); }

/* ── 탭(채널 선택기) ────────────────────────────────────── */
.tabs { display: flex; flex-wrap: wrap; gap: 6px; margin: 24px 0 16px; }

.tab {
  border: 1px solid transparent;
  border-bottom: 2px solid transparent;
  background: transparent;
  color: var(--ink-dim);
  border-radius: var(--r-sm) var(--r-sm) 0 0;
  padding: 9px 14px;
  font-size: 13px;
  transition: color 120ms ease, border-color 120ms ease, background-color 120ms ease;
}
.tab:hover:not(:disabled) { color: var(--ink); background: var(--surface); }

.tab[aria-selected="true"] {
  color: var(--amber);
  background: var(--surface);
  border-color: var(--line);
  border-bottom-color: var(--amber);
  box-shadow: 0 -1px 12px var(--amber-glow);
}

.tab:disabled { color: var(--line-strong); cursor: not-allowed; }

.panel { min-height: 380px; }

/* ── 공통 패널/카드 ─────────────────────────────────────── */
.empty-state,
.wide-section,
.control-panel,
.activation-output,
.lore-group {
  background: var(--surface);
  border: 1px solid var(--line);
  border-radius: var(--r);
  padding: 18px;
}

.empty-state h2,
.wide-section h2,
.view-header h2,
.lore-group h3,
.activation-list h3 { margin: 0; color: var(--ink); }

.empty-state p,
.view-header p,
.wide-section p { color: var(--ink-dim); }

.empty-state { text-align: center; padding: 48px 24px; }
.empty-state h2 { font-family: var(--font-mono); font-weight: 700; }

/* ── 개요 그리드 / 스탯 readout ─────────────────────────── */
.overview-grid {
  display: grid;
  grid-template-columns: repeat(3, minmax(0, 1fr));
  gap: 14px;
}

.stat-card {
  position: relative;
  min-height: 104px;
  background: var(--surface);
  border: 1px solid var(--line);
  border-radius: var(--r);
  padding: 16px;
  overflow: hidden;
}
.stat-card::before {
  content: "";
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 2px;
  background: linear-gradient(90deg, var(--amber), transparent 70%);
  opacity: 0.5;
}

.stat-label { color: var(--ink-dim); font-size: 11px; text-transform: uppercase; }

.stat-value {
  margin-top: 14px;
  font-family: var(--font-mono);
  font-size: 22px;
  font-weight: 700;
  color: var(--amber);
  overflow-wrap: anywhere;
}

.wide-section, .warning-banner { grid-column: 1 / -1; }

.warning-banner {
  border: 1px solid var(--warn);
  background: var(--warn-wash);
  color: var(--warn);
  border-radius: var(--r);
  padding: 12px 14px;
  font-size: 13px;
}

.kv-list {
  display: grid;
  grid-template-columns: minmax(180px, 0.4fr) 1fr;
  gap: 9px 16px;
  margin: 16px 0 0;
}
.kv-list dt { color: var(--ink-dim); font-family: var(--font-mono); font-size: 13px; }
.kv-list dd { margin: 0; overflow-wrap: anywhere; }

details.source-preview pre,
.profile-details pre,
.lore-entry pre {
  max-height: 420px;
  overflow: auto;
  white-space: pre-wrap;
  word-break: break-word;
  background: var(--inset);
  border: 1px solid var(--line);
  border-radius: var(--r-sm);
  padding: 12px;
  font-family: var(--font-mono);
  font-size: 12.5px;
  color: var(--ink-mid);
}

/* ── 뷰 헤더 ────────────────────────────────────────────── */
.view-header {
  display: flex;
  align-items: end;
  justify-content: space-between;
  gap: 16px;
  margin-bottom: 16px;
}
.view-header h2 { font-family: var(--font-mono); font-weight: 700; }
.view-header p { margin: 6px 0 0; font-size: 13px; }
.with-controls { align-items: center; }

.search-input,
.field input,
.conversation-input {
  width: 100%;
  border: 1px solid var(--line-strong);
  border-radius: var(--r-sm);
  background: var(--surface-2);
  color: var(--ink);
  padding: 10px 12px;
}
.search-input { max-width: 360px; }
.search-input::placeholder,
.conversation-input::placeholder,
.play-input::placeholder,
input::placeholder,
textarea::placeholder { color: var(--ink-faint); }

.search-input:focus,
input:focus,
textarea:focus,
select:focus { border-color: var(--amber-line); }

/* ── NPC 갤러리 ─────────────────────────────────────────── */
.npc-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
  gap: 14px;
}

.npc-card,
.asset-card,
.lore-entry,
.activation-row {
  background: var(--surface);
  border: 1px solid var(--line);
  border-radius: var(--r);
  overflow: hidden;
}
.npc-card:hover { border-color: var(--line-strong); }

.npc-image-wrap {
  aspect-ratio: 1 / 1.2;
  background: var(--surface-2);
  display: grid;
  place-items: center;
}
.npc-image { width: 100%; height: 100%; object-fit: contain; }

.lazy-img { opacity: 0; transition: opacity 140ms ease; }
.lazy-img[src] { opacity: 1; }
.lazy-img.broken {
  opacity: 1;
  background: repeating-linear-gradient(45deg, var(--surface-2), var(--surface-2) 12px, var(--bg) 12px, var(--bg) 24px);
}

.npc-body { padding: 14px; }
.npc-body h3 { margin: 0; font-size: 16px; color: var(--ink); }

.link-state, .muted-line { color: var(--ink-dim); font-size: 12.5px; }
.muted-line { font-family: var(--font-sans); }
.linked { color: var(--amber); }

.chip-row, .badge-row {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin: 10px 0;
}

.chip {
  border: 1px solid var(--line-strong);
  background: var(--surface-2);
  color: var(--ink-mid);
  border-radius: var(--r-sm);
  padding: 6px 10px;
  font-family: var(--font-mono);
  font-size: 12.5px;
  transition: border-color 110ms ease, color 110ms ease;
}
.chip:hover { border-color: var(--amber-line); color: var(--amber); }

.profile-details summary,
.lore-entry summary { cursor: pointer; }

/* ── 로어북 ─────────────────────────────────────────────── */
.lorebook-layout { display: grid; gap: 14px; }

.lore-group { padding: 16px; }
.lore-group h3 {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 12px;
  font-family: var(--font-mono);
  font-size: 15px;
}

.count-badge {
  display: inline-grid;
  place-items: center;
  min-width: 24px;
  height: 22px;
  padding: 0 7px;
  border-radius: 999px;
  background: var(--amber-wash);
  border: 1px solid var(--amber-line);
  color: var(--amber);
  font-size: 12px;
}

.lore-entry { margin-top: 10px; padding: 0; }

.lore-entry summary,
.activation-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  padding: 12px 14px;
}
.entry-name, .activation-head strong { overflow-wrap: anywhere; color: var(--ink); }
.entry-length, .activation-head span { flex: 0 0 auto; color: var(--ink-dim); font-size: 12px; }

.badge-row,
.key-cloud,
.lore-entry pre,
.activation-row p { margin-left: 14px; margin-right: 14px; }

.badge, .decorator-chip {
  border: 1px solid var(--line-strong);
  border-radius: 999px;
  padding: 3px 9px;
  background: var(--surface-2);
  color: var(--ink-mid);
  font-size: 11.5px;
}

.key-cloud { color: var(--ink-dim); font-size: 12.5px; overflow-wrap: anywhere; }
.key-cloud strong { color: var(--ink-mid); }

/* ── 활성화 시뮬 ────────────────────────────────────────── */
.activate-layout {
  display: grid;
  grid-template-columns: 360px minmax(0, 1fr);
  gap: 14px;
}

.control-panel { align-self: start; display: grid; gap: 12px; }

.field { display: grid; gap: 6px; color: var(--ink-dim); font-size: 12px; }
.field > span { text-transform: uppercase; }
.field input, .field textarea { color: var(--ink); font-size: 14px; }

.conversation-input { min-height: 190px; resize: vertical; }

.check-row {
  display: flex;
  align-items: center;
  gap: 8px;
  color: var(--ink-mid);
  font-size: 13px;
}
.check-row input { accent-color: var(--amber); }

.activation-output { display: grid; gap: 14px; }

.result-summary {
  display: grid;
  grid-template-columns: repeat(4, minmax(0, 1fr));
  gap: 10px;
}
.metric {
  background: var(--inset);
  border: 1px solid var(--line);
  border-radius: var(--r-sm);
  padding: 12px;
}
.metric span { display: block; color: var(--ink-dim); font-size: 11px; text-transform: uppercase; }
.metric strong {
  display: block;
  margin-top: 8px;
  font-family: var(--font-mono);
  font-size: 19px;
  color: var(--amber);
}

.activation-list { display: grid; gap: 8px; }
.activation-list h3 { font-family: var(--font-mono); font-size: 15px; }
.activation-row.active { border-color: var(--amber-line); }
.activation-row.active .activation-head strong { color: var(--amber); }

/* ── 에셋 그리드 ────────────────────────────────────────── */
.asset-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
  gap: 12px;
}
.asset-card { padding: 10px; }

.asset-preview {
  aspect-ratio: 1 / 1;
  display: grid;
  place-items: center;
  background: var(--surface-2);
  border-radius: var(--r-sm);
  overflow: hidden;
}
.asset-preview img { width: 100%; height: 100%; object-fit: contain; }

.file-icon {
  display: grid;
  place-items: center;
  width: 72px;
  height: 72px;
  border: 1px solid var(--line-strong);
  border-radius: var(--r-sm);
  background: var(--inset);
  color: var(--ink-dim);
  font-family: var(--font-mono);
  font-weight: 700;
  font-size: 13px;
}

.asset-name { margin-top: 10px; font-weight: 600; overflow-wrap: anywhere; font-size: 13px; }
.asset-meta { margin-top: 6px; color: var(--ink-dim); font-size: 11px; overflow-wrap: anywhere; }

/* ── 엔진(실험) 탭 ──────────────────────────────────────── */
.engine-view { display: grid; gap: 14px; }
.engine-header { align-items: center; }
.engine-header-controls {
  display: flex;
  flex-wrap: wrap;
  align-items: center;
  gap: 10px;
}
.engine-inline-field { display: flex; align-items: center; gap: 8px; color: var(--ink-dim); font-size: 12px; }
.engine-inline-field input { width: 84px; }
.engine-status { color: var(--amber); }
.engine-day-btn { margin-top: 0; }

.engine-layout {
  display: grid;
  grid-template-columns: minmax(0, 1.1fr) minmax(360px, 0.9fr);
  gap: 14px;
}

.engine-state-panel,
.engine-console,
.engine-section {
  background: var(--surface);
  border: 1px solid var(--line);
  border-radius: var(--r);
  padding: 16px;
}
.engine-state-panel, .engine-console { align-self: start; display: grid; gap: 14px; }

.engine-summary,
.play-context-pre,
.engine-preview {
  margin: 0;
  white-space: pre-wrap;
  word-break: break-word;
  background: var(--inset);
  border: 1px solid var(--line);
  border-radius: var(--r-sm);
  padding: 12px;
  font-family: var(--font-mono);
  font-size: 12.5px;
  color: var(--readout-ink);
}

.engine-stat-grid { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 10px; }
.engine-stat { min-height: 92px; }
.engine-stat .stat-value { font-size: 17px; }

.engine-section h3,
.play-side-section h3 {
  margin: 0 0 10px;
  font-family: var(--font-mono);
  font-size: 14px;
  color: var(--ink-mid);
  letter-spacing: 0.03em;
}

.engine-room-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 8px; }
.engine-room {
  min-height: 72px;
  border: 1px solid var(--line);
  border-radius: var(--r-sm);
  background: var(--surface-2);
  padding: 10px;
  font-size: 13px;
}
.engine-room strong { color: var(--ink); font-family: var(--font-mono); font-size: 13px; }
.engine-room.locked { opacity: 0.5; }

.engine-list { display: grid; gap: 6px; }
.engine-list-row {
  border: 1px solid var(--line);
  border-radius: var(--r-sm);
  background: var(--surface-2);
  padding: 8px 10px;
  font-family: var(--font-mono);
  font-size: 12.5px;
  overflow-wrap: anywhere;
}

.engine-warning {
  color: var(--bad);
  background: var(--bad-wash);
  border: 1px solid var(--bad);
  border-radius: var(--r-sm);
  padding: 8px 10px;
  font-size: 12.5px;
}

.engine-form, .engine-param-grid { display: grid; gap: 10px; }
.engine-form select,
.engine-form input,
.play-settings select,
.play-settings input,
.play-settings textarea {
  width: 100%;
  border: 1px solid var(--line-strong);
  border-radius: var(--r-sm);
  background: var(--surface-2);
  color: var(--ink);
  padding: 9px 11px;
}
.play-settings textarea {
  min-height: 150px;
  resize: vertical;
  font-family: var(--font-mono);
  font-size: 12.5px;
}

.engine-log-list { display: grid; gap: 8px; }
.engine-log-entry {
  background: var(--surface-2);
  border: 1px solid var(--line);
  border-radius: var(--r-sm);
  padding: 10px;
}
.engine-log-entry summary { display: flex; align-items: center; gap: 8px; cursor: pointer; font-size: 13px; }

/* ok = 앰버(활성/성공 = 켜짐), fail = 레드 */
.badge.engine-ok, .engine-ok {
  border-color: var(--amber-line);
  background: var(--amber-wash);
  color: var(--amber);
}
.badge.engine-fail, .engine-fail {
  border-color: var(--bad);
  background: var(--bad-wash);
  color: var(--bad);
}

.engine-tier-chip {
  display: inline-flex;
  margin: 8px 0 0;
  border-color: var(--amber-line);
  color: var(--amber);
  background: var(--amber-wash);
}

.engine-report { display: grid; gap: 8px; margin-top: 8px; }
.engine-table { width: 100%; border-collapse: collapse; font-family: var(--font-mono); font-size: 12.5px; }
.engine-table th, .engine-table td { border: 1px solid var(--line); padding: 6px 8px; text-align: left; }
.engine-table th { background: var(--inset); color: var(--ink-dim); }

/* ── 플레이(실험) 탭 ────────────────────────────────────── */
.play-view,
.import-view { display: grid; gap: 14px; }
.play-layout { display: grid; grid-template-columns: minmax(0, 1fr) 380px; gap: 14px; }
.mobile-hud, .play-sheet-overlay { display: none; }
.import-layout { display: grid; grid-template-columns: 380px minmax(0, 1fr); gap: 14px; }

.play-chat-panel,
.play-side-panel,
.play-side-section,
.play-settings,
.import-run-panel,
.import-review-panel,
.import-approval,
.import-full-json,
.import-editor {
  background: var(--surface);
  border: 1px solid var(--line);
  border-radius: var(--r);
  padding: 16px;
}
.play-chat-panel, .play-side-panel { align-self: start; display: grid; gap: 14px; }
.import-run-panel, .import-review-panel { align-self: start; display: grid; gap: 14px; }
.play-chat-header { margin-bottom: 0; }
.play-hero { display: flex; align-items: center; gap: 12px; min-width: 0; }
.play-hero-copy { min-width: 0; }
.play-hero-avatar, .play-speaker-avatar { flex: 0 0 auto; overflow: hidden; border-radius: 50%; border: 1px solid var(--card-accent, var(--amber)); background: var(--card-accent, var(--amber)); color: var(--on-amber); display: grid; place-items: center; font-weight: 800; }
.play-hero-avatar { width: 54px; height: 54px; font-size: 22px; }
.play-speaker-avatar { width: 24px; height: 24px; font-size: 11px; }
.play-hero-avatar img, .play-speaker-avatar img { width: 100%; height: 100%; object-fit: cover; }
.play-speaker { display: flex; align-items: center; gap: 7px; margin-bottom: 7px; color: var(--card-accent, var(--amber)); font-family: var(--font-mono); font-size: 12px; font-weight: 700; }
.npc-avatar-row { display: flex; align-items: center; gap: 4px; margin-left: 2px; }
.npc-avatar { width: 22px; height: 22px; flex: 0 0 auto; overflow: hidden; border-radius: 50%; border: 1px solid var(--line-strong); background: var(--surface-2); color: var(--ink); display: grid; place-items: center; font-size: 10px; font-weight: 800; }
.npc-avatar img { width: 100%; height: 100%; object-fit: cover; }
.npc-avatar-more { min-width: 22px; height: 22px; padding: 0 5px; border-radius: 999px; background: var(--surface-2); color: var(--ink-mid); display: grid; place-items: center; font-size: 10px; }
.play-speaker.user-label { justify-content: flex-end; color: var(--ink-mid); }

.play-stage {
  display: flex;
  align-items: flex-end;
  justify-content: center;
  gap: clamp(8px, 2vw, 24px);
  height: clamp(240px, 46vh, 55vh);
  overflow: hidden;
  padding: 10px 10px 0;
  border: 1px solid var(--line);
  border-radius: var(--r);
  background: var(--surface-2);
}
.play-stage-slot { position: relative; display: flex; flex: 1 1 0; justify-content: center; align-items: flex-end; min-width: 0; height: 100%; margin: 0; filter: brightness(.72) saturate(.85); transform: scale(.92); transform-origin: center bottom; }
.play-stage-slot.focus { z-index: 1; filter: none; transform: none; }
.play-stage-slot img { display: block; width: auto; max-width: 100%; height: 100%; object-fit: contain; }
.play-stage-slot figcaption { position: absolute; bottom: 8px; left: 50%; transform: translateX(-50%); max-width: calc(100% - 12px); padding: 3px 8px; border: 1px solid var(--line-strong); border-radius: var(--r-sm); background: var(--surface); color: var(--ink-dim); font-family: var(--font-mono); font-size: 11px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

.play-message-list {
  display: grid;
  gap: 10px;
  min-height: 420px;
  max-height: 62vh;
  overflow: auto;
  padding: 4px;
}
.play-empty { align-self: center; justify-self: center; color: var(--ink-dim); font-family: var(--font-mono); font-size: 13px; }

.play-decision-card { width: min(760px, 100%); justify-self: start; display: grid; gap: 10px; padding: 14px; border: 1px solid var(--amber-line); border-radius: var(--r); background: var(--amber-wash); box-shadow: var(--glow); }
.play-decision-card.incident { border-color: var(--warn); background: var(--warn-wash); }
.play-decision-title { color: var(--amber-bright); font-family: var(--font-mono); }
.play-decision-card.incident .play-decision-title { color: var(--warn); }
.play-decision-card p { margin: 0; color: var(--ink-mid); line-height: 1.55; }
.play-decision-actions { display: flex; flex-wrap: wrap; gap: 8px; }
.play-decision-requests { display: grid; gap: 6px; }
.play-decision-request { display: flex; align-items: center; gap: 9px; padding: 8px 10px; border: 1px solid var(--line); border-radius: var(--r-sm); background: var(--surface-2); color: var(--ink-mid); cursor: pointer; }
.play-decision-request input { accent-color: var(--amber); }

.play-message {
  max-width: min(760px, 92%);
  border: 1px solid var(--line);
  border-radius: var(--r);
  padding: 12px;
  white-space: pre-wrap;
  overflow-wrap: anywhere;
  line-height: 1.6;
}
.play-message.user {
  justify-self: end;
  background: var(--card-accent-soft, var(--amber-wash));
  border-color: var(--card-accent, var(--amber-line));
}
.play-message.assistant { justify-self: start; background: var(--surface-2); }
.play-ledger-message { justify-self: start; max-width: min(760px, 96%); padding: 4px 8px; border-left: 2px solid var(--line-strong); background: var(--inset); }
.play-ledger-message .play-chip-row { margin-top: 0; }
.play-message-text { white-space: pre-wrap; }

.play-chip-row, .play-button-row { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px; }
.event-chip { display: inline-flex; align-items: center; gap: 3px; }
.event-chip strong { color: var(--ink); font-weight: 800; }
.event-chip.chip-combat { border-color: var(--chip-combat); background: var(--chip-combat-wash); color: var(--chip-combat); }
.event-chip.chip-resource { border-color: var(--chip-resource); background: var(--chip-resource-wash); color: var(--chip-resource); }
.event-chip.chip-pool { border-color: var(--chip-pool); background: var(--chip-pool-wash); color: var(--chip-pool); }
.event-chip.chip-quest { border-color: var(--chip-quest); background: var(--chip-quest-wash); color: var(--chip-quest); }
.event-chip.chip-settlement { border-color: var(--chip-settlement); background: var(--chip-settlement-wash); color: var(--chip-settlement); }
.event-chip.chip-system, .event-chip.chip-info { border-color: var(--chip-system); background: var(--chip-system-wash); color: var(--chip-system); }
.event-chip.engine-fail { border-color: var(--bad); background: var(--bad-wash); color: var(--bad); }
.play-chip-more { width: 100%; }
.play-chip-more summary { cursor: pointer; color: var(--ink-dim); font-family: var(--font-mono); font-size: 12px; }
.play-chip-hidden { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 8px; }

.state-metrics, .state-card-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 8px; }
.state-metric, .state-card { border: 1px solid var(--line); border-radius: var(--r-sm); background: var(--inset); padding: 9px 10px; }
.state-metric > span, .state-card > span { display: block; color: var(--ink-dim); font-size: 11px; }
.state-metric > strong, .state-card > strong { display: block; margin-top: 4px; color: var(--ink); font-family: var(--font-mono); }
.state-metrics .combat-gauge { margin: 0; padding: 9px 10px; border: 1px solid var(--line); border-radius: var(--r-sm); background: var(--inset); }
.state-group h4 { margin: 2px 0 7px; color: var(--ink-mid); font-family: var(--font-mono); font-size: 12px; }
.state-detail-list { display: grid; gap: 6px; }
.state-detail-row { padding: 8px 10px; border-left: 2px solid var(--line-strong); background: var(--surface-2); color: var(--ink-mid); font-size: 12px; overflow-wrap: anywhere; }
.npc-state-row { display: flex; align-items: center; gap: 7px; }
.staff-card-grid { display: grid; gap: 8px; }
.staff-card { display: grid; grid-template-columns: 36px minmax(0, 1fr) auto; align-items: center; gap: 9px; border: 1px solid var(--line); border-radius: var(--r-sm); background: var(--inset); padding: 8px; }
.staff-avatar { width: 36px; height: 36px; overflow: hidden; border-radius: 50%; border: 1px solid var(--amber-line); background: var(--amber); color: var(--on-amber); display: grid; place-items: center; font-weight: 800; }
.staff-avatar img { width: 100%; height: 100%; object-fit: cover; }
.staff-card-copy { min-width: 0; display: grid; gap: 2px; }
.staff-card-copy strong { overflow-wrap: anywhere; color: var(--ink); font-family: var(--font-mono); font-size: 12px; }
.staff-card-copy span, .staff-capacity, .staff-help { color: var(--ink-dim); font-size: 11px; }
.staff-fire-btn { padding: 5px 8px; font-size: 11px; }
.staff-capacity { margin-top: 8px; font-family: var(--font-mono); }
.staff-help { margin: 4px 0 0; line-height: 1.45; }

.play-input-row { display: grid; grid-template-columns: minmax(0, 1fr) auto; gap: 10px; }
.play-input {
  min-height: 96px;
  resize: vertical;
  border: 1px solid var(--line-strong);
  border-radius: var(--r-sm);
  background: var(--surface-2);
  color: var(--ink);
  padding: 10px 12px;
}

.play-side-panel,
.import-run-panel { position: sticky; top: 12px; }
.play-settings { display: grid; gap: 10px; }
.play-settings summary { cursor: pointer; font-family: var(--font-mono); font-size: 13px; color: var(--ink-mid); }
.play-hidden { display: none; }
.play-notice { margin: 0; color: var(--ink-dim); font-size: 11.5px; }

.play-side-section { display: grid; gap: 10px; }
.memory-summary { margin: 0; color: var(--muted); font-size: 12px; }
.memory-review-list { display: grid; gap: 8px; }
.memory-review-card { display: grid; gap: 6px; padding: 9px; border: 1px solid var(--line); border-radius: 10px; background: rgba(255,255,255,.025); }
.memory-review-card p { margin: 0; font-size: 13px; line-height: 1.45; }
.memory-review-card small { color: var(--muted); overflow-wrap: anywhere; }
.memory-review-actions { display: flex; gap: 6px; flex-wrap: wrap; }
.ledger-section.is-busy { opacity: 0.5; }
.ledger-section .purchase-stepper { flex-wrap: wrap; }
.play-context-pre { max-height: 220px; overflow: auto; color: var(--ink-mid); }

/* 시그니처: 인광 게이지 — 상시 로어북 대비 이번 턴 주입량 */
.play-token-meter {
  display: grid;
  gap: 6px;
  border: 1px solid var(--card-accent, var(--amber-line));
  background:
    radial-gradient(120% 140% at 100% 0%, var(--card-accent-soft, var(--amber-glow)), transparent 60%),
    var(--inset);
  border-radius: var(--r-sm);
  padding: 14px;
  box-shadow: inset 0 0 24px var(--amber-halo);
}

.play-token-now {
  font-family: var(--font-mono);
  font-size: 26px;
  font-weight: 700;
  line-height: 1;
  color: var(--card-accent, var(--amber));
  text-shadow: 0 0 12px var(--amber-glow);
}

.play-token-sub {
  font-family: var(--font-mono);
  font-size: 11px;
  letter-spacing: 0.04em;
  color: var(--ink-dim);
}

.play-token-track {
  margin-top: 6px;
  height: 10px;
  border-radius: 999px;
  background: var(--bg);
  border: 1px solid var(--line);
  overflow: hidden;
}

.play-token-fill {
  height: 100%;
  width: var(--pct, 0%);
  border-radius: 999px;
  background: linear-gradient(90deg, var(--card-accent-strong, var(--amber-dim)), var(--card-accent, var(--amber)));
  box-shadow: 0 0 10px var(--amber-glow);
  transition: width 420ms ease;
}

.play-token-base {
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--ink-dim);
}

/* ── 반응형 ─────────────────────────────────────────────── */
/* Import compiler */
.import-empty { padding: 36px 20px; }
.import-section { display: grid; gap: 10px; }
.import-status-badge { display: inline-flex; width: fit-content; }
.import-metric-row,
.import-section-grid {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 10px;
}
.import-section-grid { grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); }
.import-metric strong { font-size: 18px; }
.import-issue-list,
.import-editor-list { display: grid; gap: 8px; }
.import-check-card {
  border: 1px solid var(--line);
  border-radius: var(--r-sm);
  padding: 12px 14px;
  line-height: 1.5;
}
.import-check-auto { border-color: var(--amber-line); background: var(--amber-wash); color: var(--amber); }
.import-check-review { border-color: var(--warn); background: var(--warn-wash); color: var(--warn); }
.import-check-error { border-color: var(--bad); background: var(--bad-wash); color: var(--bad); }
.compatibility-summary {
  display: grid;
  gap: 8px;
  margin-top: 6px;
  padding-top: 12px;
  border-top: 1px solid var(--line);
}
.compatibility-summary h4 { margin: 0; color: var(--ink); }
.compatibility-supported { border-color: rgba(116, 183, 195, 0.45); color: var(--cyan); }
.compatibility-translated { border-color: var(--amber-line); background: var(--amber-wash); color: var(--amber); }
.compatibility-preserved { color: var(--ink-mid); }
.compatibility-degraded { border-color: var(--warn); background: var(--warn-wash); color: var(--warn); }
.compatibility-blocked { border-color: var(--bad); background: var(--bad-wash); color: var(--bad); }
.import-advanced {
  background: var(--surface);
  border: 1px solid var(--line);
  border-radius: var(--r);
  padding: 16px;
}
.import-advanced > summary { cursor: pointer; color: var(--ink-mid); font-weight: 700; }
.import-advanced > .import-editor-list { margin-top: 14px; }
.import-issue { font-family: var(--font-mono); }
.import-warn {
  border-color: var(--warn);
  background: var(--warn-wash);
  color: var(--warn);
}
.import-assumption-list {
  margin: 0;
  padding-left: 20px;
  color: var(--amber);
}
.import-editor {
  padding: 0;
  overflow: hidden;
}
.import-editor summary,
.import-full-json summary {
  cursor: pointer;
  color: var(--ink-mid);
}
.import-editor summary { padding: 12px 14px; }
.import-json-input {
  display: block;
  width: calc(100% - 28px);
  min-height: 220px;
  margin: 0 14px 12px;
  resize: vertical;
  border: 1px solid var(--line);
  border-radius: var(--r-sm);
  background: var(--inset);
  color: var(--readout-ink);
  padding: 12px;
  font-family: var(--font-mono);
  font-size: 12.5px;
}
.import-editor .secondary-btn { margin: 0 14px 14px; }
.import-json-pre {
  max-height: 520px;
  overflow: auto;
  margin-top: 12px;
}
.import-approval {
  display: flex;
  flex-wrap: wrap;
  align-items: center;
  gap: 12px;
}
.import-approval .primary-btn { margin-top: 0; }

@media (max-width: 900px) {
  .topbar, .view-header, .with-controls { align-items: stretch; flex-direction: column; }
  .overview-grid, .result-summary { grid-template-columns: repeat(2, minmax(0, 1fr)); }
  .activate-layout, .engine-layout, .play-layout, .import-layout { grid-template-columns: 1fr; }
  .play-side-panel { display: none; }
  .import-run-panel { position: static; }
  .engine-header-controls { justify-content: flex-start; }
  .search-input { max-width: none; }
  body.sheet-open { overflow: hidden; }
  .play-view, .play-layout { min-height: calc(100dvh - 120px); }
  .play-layout { display: flex; flex-direction: column; gap: 0; }
  .mobile-hud { position: sticky; top: 0; z-index: 20; display: flex; align-items: center; justify-content: space-between; gap: 8px; min-height: 48px; padding: 6px 8px; border: 1px solid var(--line); background: var(--surface); }
  .mobile-hud-facts { min-width: 0; display: flex; align-items: center; gap: 10px; overflow-x: auto; }
  .mobile-hud-fact { flex: 0 0 auto; font-family: var(--font-mono); font-size: 11px; color: var(--ink-mid); }
  .mobile-mini-gauge { flex: 0 0 auto; min-width: 92px; }
  .mobile-mini-gauge > .mobile-hud-fact { display: block; }
  .mobile-mini-gauge .combat-gauge { margin: 2px 0 0; }
  .mobile-mini-gauge .combat-gauge-head { display: none; }
  .mobile-mini-gauge .combat-gauge-track { height: 5px; }
  .mobile-state-button { flex: 0 0 auto; margin: 0; padding: 7px 9px; }
  .play-chat-panel { flex: 1; min-height: 0; padding: 10px; border-top: 0; }
  .play-stage { height: clamp(200px, 38vh, 44vh); }
  .play-stage-slot:not(.focus) { display: none; }
  .play-message-list { flex: 1; min-height: 45dvh; max-height: none; }
  .play-input-row { position: sticky; bottom: 0; z-index: 18; grid-template-columns: minmax(0, 1fr) auto; align-items: stretch; padding: 8px 0 env(safe-area-inset-bottom); background: var(--surface); }
  .play-input { min-height: 46px; max-height: 96px; }
  .play-input-row .primary-btn { margin-top: 0; }
  .combat-console { display: flex; overflow-x: auto; padding: 8px; }
  .combat-command-row { flex-wrap: nowrap; flex: 0 0 auto; }
  .combat-command-row button, .combat-console > button { white-space: nowrap; }
  .mgmt-console { flex: 0 0 auto; }
  .mgmt-console[open] { max-height: 180px; overflow-x: auto; overflow-y: auto; }
  .mgmt-section { flex-wrap: nowrap; width: max-content; }
  .mgmt-section button { white-space: nowrap; }
  .play-sheet-overlay { position: fixed; inset: 0; z-index: 100; align-items: end; background: var(--amber-halo); }
  .play-sheet-overlay.open { display: flex; }
  .play-bottom-sheet { width: 100%; max-height: 80dvh; overflow-y: auto; padding: 12px; background: var(--surface); border: 1px solid var(--line-strong); border-radius: var(--r) var(--r) 0 0; box-shadow: var(--shadow); animation: sheet-in 180ms ease-out; }
  .sheet-head { position: sticky; top: 0; z-index: 1; display: flex; justify-content: space-between; align-items: center; padding-bottom: 8px; background: var(--surface); }
  .sheet-head .secondary-btn { margin: 0; }
  .sheet-handle { width: 84px; height: 22px; overflow: hidden; text-indent: -9999px; border: 0; background: transparent; position: relative; }
  .sheet-handle::after { content: ''; position: absolute; left: 12px; top: 8px; width: 60px; height: 4px; border-radius: 999px; background: var(--line-strong); }
  @keyframes sheet-in { from { transform: translateY(100%); } to { transform: translateY(0); } }
}

@media (max-width: 560px) {
  main { padding: 16px 14px 48px; }
  .overview-grid, .result-summary, .engine-stat-grid, .kv-list { grid-template-columns: 1fr; }
  .lore-entry summary, .activation-head { align-items: start; flex-direction: column; }
  .play-input-row { display: grid; grid-template-columns: minmax(0, 1fr) auto; }
  .landing-steps { flex-direction: column; gap: 8px; }
}

@media (prefers-reduced-motion: reduce) {
  .topbar h1::before { animation: none; }
  * { transition: none !important; }
  .play-bottom-sheet { animation: none !important; }
}

.offscreen { position: fixed; left: -9999px; top: 0; opacity: 0; }

.combat-console {
  display: grid;
  gap: 8px;
  padding: 12px 14px;
  border-top: 1px solid var(--line);
  background: var(--surface-2);
}

.combat-console:empty { display: none; }
.combat-command-row { display: flex; flex-wrap: wrap; align-items: center; gap: 7px; }
.combat-command-row .primary-btn,
.combat-command-row .secondary-btn,
.combat-console > .primary-btn,
.combat-console > .secondary-btn { margin-top: 0; padding: 7px 10px; }
.combat-command-label { color: var(--ink-dim); font-family: var(--font-mono); font-size: 12px; }
.combat-gauge { margin-bottom: 11px; }
.combat-gauge-head { margin-bottom: 5px; color: var(--ink-mid); font-family: var(--font-mono); font-size: 12px; }
.combat-gauge-track { height: 8px; overflow: hidden; border: 1px solid var(--line-strong); border-radius: var(--r-sm); background: var(--inset); }
.combat-gauge-fill { width: var(--pct); height: 100%; background: var(--card-accent, var(--amber)); transition: width 140ms ease; }

.play-input-row .primary-btn, .play-view .primary-btn { background: var(--card-accent, var(--amber)); border-color: var(--card-accent, var(--amber)); }
.play-view .badge.engine-ok:not(.event-chip), .play-view .engine-ok:not(.event-chip) { border-color: var(--card-accent, var(--amber-line)); background: var(--card-accent-soft, var(--amber-wash)); color: var(--card-accent, var(--amber)); }

.mgmt-console { padding: 12px 14px; border-top: 1px solid var(--line); background: var(--surface-2); }
.mgmt-console:empty { display: none; }
.mgmt-console > summary { cursor: pointer; color: var(--ink-mid); font-family: var(--font-mono); }
.mgmt-section { display: flex; flex-wrap: wrap; align-items: center; gap: 7px; margin-top: 9px; }
.mgmt-section .primary-btn, .mgmt-section .secondary-btn { margin-top: 0; padding: 7px 10px; }
.purchase-stepper { display: inline-flex; align-items: center; gap: 6px; }
.purchase-stepper .purchase-qty { width: 64px; padding: 7px 6px; text-align: center; }

      statCard("\uD3EC\uB9F7", `${parsed.format || "-"} \xB7 ${parsed.spec || "-"} ${parsed.specVersion || ""}`.trim()),
      statCard("\uD30C\uC77C \uD06C\uAE30", formatBytes(file.size)),
      statCard("\uB85C\uC5B4\uBD81", lore ? `${stats.total}\uAC1C \xB7 \uC0C1\uC2DC ${stats.constant}\uAC1C` : "\uC5C6\uC74C"),
      statCard("\uC5D0\uC14B", `${parsed.assets.length}\uAC1C \xB7 \uC989\uC2DC \uB514\uCF54\uB4DC ${decoded}\uAC1C`),
      statCard("NPC \uC5F0\uACB0", `${npcClusters.linkedCount}/${npcClusters.groups.length} \uD074\uB7EC\uC2A4\uD130`)
    );
    if (state.avifSupported === false && parsed.assets.some((asset) => String(asset.ext).toLowerCase() === "avif")) {
      const banner = document.createElement("div");
      banner.className = "warning-banner";
      banner.textContent = "\uC774 \uBE0C\uB77C\uC6B0\uC800\uB294 AVIF \uC774\uBBF8\uC9C0\uB97C \uD45C\uC2DC\uD558\uC9C0 \uBABB\uD560 \uC218 \uC788\uC2B5\uB2C8\uB2E4. \uD45C\uBCF8 \uCE74\uB4DC\uC758 \uB300\uBD80\uBD84 \uC5D0\uC14B\uC740 AVIF\uC785\uB2C8\uB2E4.";
      wrap.prepend(banner);
    }
    const lengths = document.createElement("section");
    lengths.className = "wide-section";
    lengths.append(
      sectionTitle("\uD504\uB86C\uD504\uD2B8 \uAE38\uC774"),
      keyValueList([
        ["first_mes", `${firstMes.length.toLocaleString()}\uC790`],
        ["post_history_instructions", `${postHistory.length.toLocaleString()}\uC790`],
        ["lazy \uADFC\uAC70", parsed.lazy ? `\uC6D0\uBCF8 \uBC84\uD37C \uBCF4\uC874, \uC5D0\uC14B bytes=${decoded}` : `\uC989\uC2DC \uD30C\uC2F1 \uD3EC\uB9F7, \uC5D0\uC14B bytes=${decoded}`]
      ])
    );
    const details = document.createElement("details");
    details.className = "source-preview wide-section";
    const summary = document.createElement("summary");
    summary.textContent = "\uCE74\uB4DC \uC6D0\uBB38 \uD504\uB9AC\uBDF0";
    const pre = document.createElement("pre");
    pre.textContent = JSON.stringify(parsed.card, null, 2).slice(0, 24e3);
    details.append(summary, pre);
    wrap.append(lengths, details);
    return wrap;
  }
  function statCard(label, value) {
    const el4 = document.createElement("section");
    el4.className = "stat-card";
    const k = document.createElement("div");
    k.className = "stat-label";
    k.textContent = label;
    const v = document.createElement("div");
    v.className = "stat-value";
    v.textContent = value;
    el4.append(k, v);
    return el4;
  }
  function sectionTitle(text) {
    const h = document.createElement("h2");
    h.textContent = text;
    return h;
  }
  function keyValueList(rows) {
    const dl = document.createElement("dl");
    dl.className = "kv-list";
    for (const [key, value] of rows) {
      const dt = document.createElement("dt");
      dt.textContent = key;
      const dd = document.createElement("dd");
      dd.textContent = value;
      dl.append(dt, dd);
    }
    return dl;
  }
  function objectUrlFor(asset) {
    if (!asset || !asset.found) return "";
    if (state.viewUrls.has(asset)) return state.viewUrls.get(asset);
    const bytes = (0, import_cardAssets.cardAssetBytes)(state.parsed, asset);
    if (!bytes) return "";
    const url = URL.createObjectURL(new Blob([bytes], { type: asset.mime || "application/octet-stream" }));
    state.viewUrls.set(asset, url);
    return url;
  }
  function clearTabResources() {
    if (typeof state.cleanup === "function") state.cleanup();
    state.cleanup = null;
    revokeViewUrls();
  }
  function revokeViewUrls() {
    for (const url of state.viewUrls.values()) URL.revokeObjectURL(url);
    state.viewUrls.clear();
  }
  function setMessage(text) {
    const el4 = document.getElementById("message");
    if (el4) el4.textContent = text;
  }
  function formatBytes(value) {
    const n = Number(value || 0);
    if (n < 1024) return `${n} B`;
    if (n < 1024 * 1024) return `${(n / 1024).toFixed(1)} KB`;
    return `${(n / (1024 * 1024)).toFixed(1)} MB`;
  }
  function detectAvifSupport() {
    return new Promise((resolve) => {
      const img = new Image();
      img.onload = () => resolve(img.width > 0);
      img.onerror = () => resolve(false);
      img.src = "data:image/avif;base64,AAAAIGZ0eXBhdmlmAAAAAGF2aWZtaWYxbWlhZgAAAPBtZXRhAAAAAAAAACFoZGxyAAAAAAAAAABwaWN0AAAAAAAAAAAAAAAAAAAAAAAADnBpdG0AAAAAAAEAAAAeaWxvYwAAAAAEQAABAAAAAQAAABIAAAAoAAAAKGlpbmYAAAAAAAEAAAAaaW5mZQIAAAAAAQAAAGF2MDFJbWFnZQAAAAAOcGl4aQAAAAADCAgIAAAAFWlzcGUAAAAAAAAAAQAAAAEAAAAQcGFzcAAAAAEAAAABAAAAFGNvbHJuY2x4AAEABQABAAAAGGlwbWEAAAAAAAAAAQABBAUBgYAAAEdtZGF0EgAKBzgABogQEAwgMg8f8D///8WfhwB8+ErK42A=";
    });
  }
  window.SIMBOT_DEBUG = {
    getState: () => state,
    buildNpcClusters: () => state.parsed ? buildNpcClusters(state.parsed, state.lore) : null
  };
})();

  </script>
